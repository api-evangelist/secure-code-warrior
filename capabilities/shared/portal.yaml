naftiko: "1.0.0-alpha1"

info:
  label: "Secure Code Warrior Portal API"
  description: "Developer security training platform API for user management, training reporting, assessments, and metrics."
  tags:
    - Security Training
    - Application Security
    - Developer Training
    - Reporting
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SCW_API_KEY: SCW_API_KEY

capability:
  consumes:
    - type: http
      namespace: scw-portal
      baseUri: https://portal-api.securecodewarrior.com/api/v2
      description: "Secure Code Warrior Portal API for training management and reporting"
      authentication:
        type: apikey
        key: X-API-Key
        value: "{{SCW_API_KEY}}"
        placement: header
      resources:
        - name: users
          path: /users
          description: "Manage platform users"
          operations:
            - name: list-users
              method: GET
              description: "List all users in the organization"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-user
              method: POST
              description: "Create a new user account"
              body:
                type: json
                data:
                  email: "{{tools.email}}"
                  firstName: "{{tools.firstName}}"
                  lastName: "{{tools.lastName}}"
                  role: "{{tools.role}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: teams
          path: /teams
          description: "Manage teams"
          operations:
            - name: list-teams
              method: GET
              description: "List all teams in the organization"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                - name: name
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: developer-leaderboard
          path: /training/developer-leaderboard
          description: "Developer training leaderboard"
          operations:
            - name: get-developer-leaderboard
              method: GET
              description: "Get developer leaderboard with training stats"
              inputParameters:
                - name: report_period
                  in: query
                  type: integer
                  required: false
                  description: "Report period in days (1, 7, or 30)"
                - name: page
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: developers-progress
          path: /training/developers-progress
          description: "Developer training progress"
          operations:
            - name: get-developers-progress
              method: GET
              description: "Get training progress with realm, level, and quest data"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: assessments
          path: /assessments
          description: "Manage security assessments"
          operations:
            - name: list-assessments
              method: GET
              description: "List all assessments in the organization"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                - name: startdate
                  in: query
                  type: string
                  required: false
                - name: enddate
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: courses
          path: /courses
          description: "Manage security courses"
          operations:
            - name: list-courses
              method: GET
              description: "List all available security training courses"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: time-spent
          path: /metrics/time-spent
          description: "Time spent metrics"
          operations:
            - name: get-time-spent
              method: GET
              description: "Get time spent across training activities"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                - name: team
                  in: query
                  type: string
                  required: false
                - name: startdate
                  in: query
                  type: string
                  required: false
                - name: enddate
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: audit-log
          path: /audit-log
          description: "System audit log"
          operations:
            - name: get-audit-log
              method: GET
              description: "Retrieve system audit logs"
              inputParameters:
                - name: from_date
                  in: query
                  type: string
                  required: true
                - name: to_date
                  in: query
                  type: string
                  required: true
                - name: page
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: scw-portal-rest
      resources:
        - path: /v1/users
          name: users
          description: "User management"
          operations:
            - method: GET
              name: list-users
              description: "List organization users"
              call: "scw-portal.list-users"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/training/leaderboard
          name: leaderboard
          description: "Training leaderboard"
          operations:
            - method: GET
              name: get-developer-leaderboard
              description: "Get developer leaderboard"
              call: "scw-portal.get-developer-leaderboard"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: scw-portal-mcp
      transport: http
      tools:
        - name: list-users
          description: "List all developers in the Secure Code Warrior organization"
          hints:
            readOnly: true
            openWorld: false
          call: "scw-portal.list-users"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-developer-leaderboard
          description: "Get developer training leaderboard with points, completions, and rank changes"
          hints:
            readOnly: true
            openWorld: false
          call: "scw-portal.get-developer-leaderboard"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-developers-progress
          description: "Get training progress showing realm, level, and quest completion per developer"
          hints:
            readOnly: true
            openWorld: false
          call: "scw-portal.get-developers-progress"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-assessments
          description: "List security assessments with status, language, and difficulty"
          hints:
            readOnly: true
            openWorld: false
          call: "scw-portal.list-assessments"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-courses
          description: "List available security training courses"
          hints:
            readOnly: true
            openWorld: false
          call: "scw-portal.list-courses"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-time-spent
          description: "Get time spent on training, assessments, courses, and tournaments by developer or team"
          hints:
            readOnly: true
            openWorld: false
          call: "scw-portal.get-time-spent"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-audit-log
          description: "Retrieve system audit log entries for a date range"
          hints:
            readOnly: true
            openWorld: false
          call: "scw-portal.get-audit-log"
          outputParameters:
            - type: object
              mapping: "$."
